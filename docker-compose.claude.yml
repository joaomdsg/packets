# Docker Compose configuration for Claude Code backend
# Usage: docker compose -f docker-compose.claude.yml up -d
#
# Prerequisites:
# 1. Copy example.env to .env
# 2. Set GITHUB_TOKEN and TARGET_REPO
# 3. Set CLAUDE_API_KEY (get from https://console.anthropic.com)
# 4. Optionally set CLAUDE_MODEL (default: sonnet)

services:
  agntpr:
    image: ghcr.io/joaomdsg/agntpr:latest-claude
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TARGET_REPO=${TARGET_REPO}
      - AI_BACKEND=claude
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-sonnet}
      - POLL_INTERVAL=${POLL_INTERVAL:-60}
      - RESET_DB=${RESET_DB:-false}
      - DEBUG=${DEBUG:-false}
      - WORK_DIR=/work
      - DATABASE_PATH=/data/agntpr.db
      - DOCKER_HOST=tcp://docker:2375
    volumes:
      - work-data:/work
      - db-data:/data
      - docker-certs:/certs/client:ro
    depends_on:
      - docker
    restart: unless-stopped

  docker:
    image: docker:27-dind
    privileged: true
    volumes:
      - docker-data:/var/lib/docker
    command: ["--tls=false"]
    restart: unless-stopped

volumes:
  work-data:
  db-data:
  docker-certs:
  docker-data:
