name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# packets's go.mod uses `replace github.com/go-via/via => ../via`, so the build
# needs the via module checked out as a SIBLING directory at the exact commit
# the local build pins. Every job reproduces that two-checkout layout:
#   $GITHUB_WORKSPACE/packets  (this repo)
#   $GITHUB_WORKSPACE/via     (go-via/via @ VIA_REF)
# and runs go commands from the packets dir, where ../via resolves.
env:
  VIA_REPO: go-via/via
  VIA_REF: 60cf0cd775aa5a6f2d7c27ed24aff2ef6d38a277 # design/state-backplane; 36 ahead of v0.4.2
  # NOT go-version-file: go.mod's `go 1.24.0` is the language MINIMUM, but via's
  # SSE handshake relies on net/http streaming behavior that only flushes the way
  # the tests expect on Go >= 1.26 (on 1.24 the SSE stream closes before the
  # `: ready` frame and every live-card/surface test fails). Build on the Go the
  # project actually targets, not the declared floor.
  GO_VERSION: "1.26"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: packets
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.VIA_REPO }}
          ref: ${{ env.VIA_REF }}
          path: via
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        working-directory: packets
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: packets
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.VIA_REPO }}
          ref: ${{ env.VIA_REF }}
          path: via
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Vet
        working-directory: packets
        run: go vet ./...
      # Build the cage image so the #6c sandbox tests run for REAL instead of
      # skipping: requireCageImage / requireDocker gate the break-out proofs and
      # the in-proc≡cage equivalence lock on this image being present. Without
      # this step those tests skip green and the security boundary is unverified
      # by the pipeline. ubuntu-latest ships a running Docker daemon.
      - name: Build cage image
        working-directory: packets
        run: docker build -f internal/cage/Dockerfile -t packets-cage:dev .
      - name: Test
        working-directory: packets
        # The catch oracle and mutation tests shell out to `go test` and git in
        # temp repos, so the suite needs git (present on ubuntu-latest) and a
        # longer timeout than the default. With the cage image built above, the
        # real-container sandbox + equivalence tests run here too.
        #
        # -p 1 serializes PACKAGE execution: the sandbox and cage packages both
        # launch containers labelled io.packets.sandbox=1, and the "no orphan /
        # reaped" assertions filter on that shared label — so running the two
        # packages concurrently lets one package's live containers fail the
        # other's global-label assertion. Serial package execution keeps the
        # docker-state assertions isolated (within-package tests are already
        # non-parallel). Within-test parallelism (t.Parallel) is unaffected.
        run: go test -race -timeout 20m -p 1 ./...
      # Guard against silent skips: a regression (or a missing image) that made
      # the cage tests skip would otherwise leave the job green. Re-run the
      # load-bearing integration tests verbosely and FAIL unless they actually
      # ran to PASS — a SKIP leaves no PASS line and trips the grep.
      - name: Assert the cage security tests actually ran
        working-directory: packets
        shell: bash
        run: |
          set -o pipefail
          go test -count=1 -v -timeout 20m -p 1 \
            -run 'TestEquivalence_cagedCatchProjectionMatchesInProcess|TestDockerRunner_blocksNamespaceCreationViaSeccomp|TestDockerRunner_deniesEgressTheHardenedContainerHasNoNetwork' \
            ./internal/cage/ ./internal/sandbox/ | tee cage-int.log
          for tc in \
            'TestEquivalence_cagedCatchProjectionMatchesInProcess' \
            'TestDockerRunner_blocksNamespaceCreationViaSeccomp' \
            'TestDockerRunner_deniesEgressTheHardenedContainerHasNoNetwork'; do
            grep -q "^--- PASS: ${tc}" cage-int.log || { echo "FAIL: ${tc} did not run (skipped?) — the cage security boundary is unverified"; exit 1; }
          done
