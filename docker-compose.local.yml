# Docker Compose configuration for local development
# Usage: docker compose -f docker-compose.local.yml up --build
#
# Features:
# - Source code mounted for hot reload
# - Debug mode enabled
# - Local volumes for easy inspection
# - Database persisted locally
# - Credentials embedded at build time
#
# Prerequisites:
# 1. Create internal/auth/credentials.txt with your GitHub App credentials
# 2. Copy example.env to .env
# 3. Set GITHUB_APP_INSTALLATION_ID and TARGET_REPO (or GITHUB_TOKEN for PAT mode)
# 4. Choose AI_BACKEND (opencode or claude)

services:
  agntpr:
    build:
      context: .
      args:
        AI_BACKEND: ${AI_BACKEND:-opencode}
    environment:
      # Auth: Use either GITHUB_TOKEN (PAT) or GITHUB_APP_INSTALLATION_ID (App)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - TARGET_REPO=${TARGET_REPO}
      - AI_BACKEND=${AI_BACKEND:-opencode}
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-sonnet}
      - OPENCODE_MODEL=${OPENCODE_MODEL:-opencode/kimi-k2.5-free}
      - POLL_INTERVAL=${POLL_INTERVAL:-30}
      - RESET_DB=${RESET_DB:-false}
      - DEBUG=true
      - WORK_DIR=/work
      - DATABASE_PATH=/data/agntpr.db
      - DOCKER_HOST=tcp://docker:2375
    volumes:
      - agntpr-work:/work
      - agntpr-data:/data
      - docker-certs:/certs/client:ro
      # Optional: Mount OpenCode config for testing custom providers
      # - ./opencode-config:/home/agent/.config/opencode:ro
      # - ./opencode-auth.json:/home/agent/.local/share/opencode/auth.json:ro
    depends_on:
      - docker
    restart: "no"

  docker:
    image: docker:27-dind
    privileged: true
    volumes:
      - docker-data:/var/lib/docker
    command: ["--tls=false"]
    restart: "no"

volumes:
  agntpr-work:
  agntpr-data:
  docker-certs:
  docker-data:
